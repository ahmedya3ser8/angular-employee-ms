<section class="flex flex-col gap-8">

  <app-page-header
    [title]="'Attendance'"
    [subTitle]="'Track your work hours and daily check-ins'"
  />

  @if (isLoading()) {
    <div class="flex justify-center items-center h-[10vh]">
      <span class="loader"></span>
    </div>
  }
  @else {
    <app-attendance-stats
      [attendanceStats]="attendanceStats()"
    />
  }

  <app-data-table
    [columns]="columns"
    [data]="attendances()"
    [isLoading]="isLoading()"
  />

  <div (click)="createAttendance()" class="absolute bottom-4 right-4 bg-linear-to-r from-[#4F39F6] to-[#615FFF] text-white flex items-center gap-4 py-2.5 px-5 rounded-md cursor-pointer transition-all duration-300 hover:from-[#3d28de] hover:to-[#5957e4]">
    @if (isLoading()) {
      <ng-icon class="text-lg animate-spin mx-auto" name="lucideLoader" />
    } @else {
      <ng-icon class="text-2xl" name="lucideLogIn" />
    }
    <div class="text-center">
      <h3 class="text-lg font-medium"> Clock In </h3>
      <p class="text-xs"> start your work day </p>
    </div>
  </div>

</section>
