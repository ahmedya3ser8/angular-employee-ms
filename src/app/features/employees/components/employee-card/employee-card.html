<div class="border border-[#E2E8F0B2] rounded-md overflow-hidden transition-all duration-500 hover:-translate-y-2 hover:shadow-md">

  <div class="bg-linear-to-r from-[#F1F5F9] to-[#F8FAFC] aspect-4/3 w-full flex flex-col justify-center items-center relative">

    <span class="bg-white text-slate-600 font-semibold text-xs rounded-md shadow-sm px-2.5 py-1 absolute top-4 left-4">
      {{ employee().department }}
    </span>

    <div class="size-20 bg-linear-to-r from-[#E0E7FF] to-[#F1F5F9] rounded-full capitalize text-[#7C86FF] font-medium text-2xl flex justify-center items-center">
      {{ employee().firstName[0] }} {{ employee().lastName[0] }}
    </div>

  </div>

  <div class="p-5 flex justify-between items-center">

    <div class="space-y-0.5">

      <h3 class="text-[#0F172B] capitalize">
        {{ employee().firstName }} {{ employee().lastName }}
      </h3>

      <p class="text-xs text-[#62748E]">
        {{ employee().position }}
      </p>

    </div>

    <div class="flex gap-2">

      <a [routerLink]="['/employees/edit', employee()._id]" class="badge-edit">
        <ng-icon name="lucidePen" />
      </a>

      <button (click)="deleteEmployee(employee()._id)" class="badge-delete">
        <ng-icon name="lucideTrash" />
      </button>

    </div>

  </div>

</div>
