<div class="w-full md:w-md flex items-center gap-3 border border-slate-200 rounded-md p-6">

  <div class="size-10 bg-[#F1F5F9] text-[#45556C] p-2.5 rounded-md">
    <ng-icon class="text-lg" name="lucideLock" />
  </div>

  <div class="flex justify-between flex-1">
    <div class="space-y-0.5">
      <h3 class="text-[#0F172B] font-medium"> Password </h3>
      <p class="text-sm text-[#62748E]"> Update your account password </p>
    </div>
    <button (click)="showDialog()" type="button" class="btn-secondary"> Change </button>
  </div>

</div>
