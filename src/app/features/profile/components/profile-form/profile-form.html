<form [formGroup]="profileForm" (ngSubmit)="submitForm()" class="border border-slate-200 rounded-md p-6">

  <h2 class="font-medium border-b border-slate-100 pb-5">
    Public Profile
  </h2>

  <div class="flex flex-col gap-6 pt-5">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <app-input
        [id]="'firstName'"
        [label]="'First Name'"
        formControlName="firstName"
        [control]="profileForm.get('firstName')"
        [placeholder]="'John'"
        [errors]="{
          'required': 'firstName is required',
          'minlength': 'firstName must be at least 2 characters',
          'maxlength': 'firstName must be at most 30 characters'
        }"
      />
      <app-input
        [id]="'lastName'"
        [label]="'Last Name'"
        formControlName="lastName"
        [control]="profileForm.get('lastName')"
        [placeholder]="'Doe'"
        [errors]="{
          'required': 'lastName is required',
          'minlength': 'lastName must be at least 2 characters',
          'maxlength': 'lastName must be at most 30 characters'
        }"
      />
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <app-input
        [id]="'email'"
        [label]="'Work Email'"
        [type]="'email'"
        formControlName="email"
        [control]="profileForm.get('email')"
        [placeholder]="'john@gmail.com'"
        [errors]="{
          'required': 'email is required',
          'email': 'invalid email address'
        }"
      />
      <app-input
        [id]="'position'"
        [label]="'Position'"
        formControlName="position"
        [control]="profileForm.get('position')"
        [placeholder]="'Marketing'"
        [errors]="{
          'required': 'position is required',
          'minlength': 'position must be at least 2 characters',
          'maxlength': 'position must be at most 30 characters'
        }"
      />
    </div>

    <div class="space-y-2">
      <label for="bio" class="label"> Bio (Optional) </label>
      <textarea formControlName="bio" class="input h-25 resize-none" id="bio" placeholder="Write a brief bio..."></textarea>
      @if (profileForm.get('bio')?.errors && profileForm.get('bio')?.touched) {
        @if (profileForm.get('bio')?.getError('maxlength')) {
          <p class="text-rose-500 text-sm lowercase"> bio must not exceed 500 characters </p>
        }
      }
    </div>

    <div class="flex justify-end">
      <button type="submit" class="btn-primary flex gap-2 items-center">
        @if (isLoading()) {
          <ng-icon class="text-lg animate-spin mx-auto" name="lucideLoader" />
        } @else {
          <ng-icon class="text-lg" name="lucideSave" />
          Save Changes
        }
      </button>
    </div>

  </div>

</form>
