<div class="border border-[#E2E8F0] rounded-lg p-6 flex items-center justify-between relative overflow-hidden transition-all duration-500 hover:-translate-y-2 group">

  <div class="absolute w-1 h-full bg-[#62748EB2] left-0 rounded-tr-2xl rounded-br-2xl transition-all duration-500 group-hover:bg-indigo-500/70"></div>

  <div class="space-y-1">
    <h4 class="text-sm text-[#314158] font-medium">
      {{ title() }}
    </h4>
    <span class="text-2xl font-bold text-[#0F172B]">
      {{ value() }}
      @if(isLeave()) {
        <span class="text-[#90A1B9] text-base"> taken </span>
      }
    </span>
  </div>

  <div class="size-10 bg-slate-100! transition-all duration-500 group-hover:bg-indigo-50! flex items-center justify-center rounded-md">
    <ng-icon class="text-[22px] text-slate-600! transition-all duration-500 group-hover:text-indigo-500!" [name]="icon()" />
  </div>

</div>
